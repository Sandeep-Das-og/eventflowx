spring:
  application:
    name: wallet-service
  profiles:
    active: local
  datasource:
    url: jdbc:h2:mem:walletdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    driver-class-name: org.h2.Driver
    username: sa
    password:
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        format_sql: true
  h2:
    console:
      enabled: true
      path: /h2-console
  rabbitmq:
    host: ${RABBITMQ_HOST:localhost}
    port: ${RABBITMQ_PORT:5672}
    username: ${RABBITMQ_USERNAME:guest}
    password: ${RABBITMQ_PASSWORD:guest}

server:
  port: 8084

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  tracing:
    sampling:
      probability: 1.0
  zipkin:
    tracing:
      endpoint: ${ZIPKIN_ENDPOINT:http://localhost:9411/api/v2/spans}

logging:
  level:
    root: INFO
    com.eventflowx: INFO
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss.SSS} [%thread] %-5level [%X{traceId:-},%X{spanId:-}] %logger{36} - %msg%n"

wallet:
  default-balance: 1000
  booking-charge: 50

---
spring:
  config:
    activate:
      on-profile: local

---
spring:
  config:
    activate:
      on-profile: dev
  datasource:
    url: ${WALLET_DB_URL:jdbc:postgresql://localhost:5432/wallet_db}
    driver-class-name: org.postgresql.Driver
    username: ${WALLET_DB_USERNAME:wallet_user}
    password: ${WALLET_DB_PASSWORD:wallet_password}
  h2:
    console:
      enabled: false

---
spring:
  config:
    activate:
      on-profile: prod
  datasource:
    url: ${WALLET_DB_URL:jdbc:postgresql://postgres:5432/wallet_db}
    driver-class-name: org.postgresql.Driver
    username: ${WALLET_DB_USERNAME:wallet_user}
    password: ${WALLET_DB_PASSWORD:wallet_password}
  h2:
    console:
      enabled: false
  jpa:
    hibernate:
      ddl-auto: validate
