apiVersion: 1

groups:
  - name: eventflowx-service-alerts
    folder: EventFlowX
    interval: 1m
    rules:
      - uid: eventflowx_high_5xx_rate
        title: High 5xx Error Rate
        condition: C
        data:
          - refId: A
            datasourceUid: Prometheus
            relativeTimeRange:
              from: 300
              to: 0
            model:
              expr: sum(rate(http_server_requests_seconds_count{outcome="SERVER_ERROR"}[5m])) by (job)
              intervalMs: 1000
              maxDataPoints: 43200
              refId: A
          - refId: B
            datasourceUid: Prometheus
            relativeTimeRange:
              from: 300
              to: 0
            model:
              expr: sum(rate(http_server_requests_seconds_count[5m])) by (job)
              intervalMs: 1000
              maxDataPoints: 43200
              refId: B
          - refId: C
            datasourceUid: __expr__
            relativeTimeRange:
              from: 300
              to: 0
            model:
              expression: A / B * 100
              type: math
              refId: C
        for: 5m
        annotations:
          summary: 'High 5xx error rate in {{ $labels.job }}'
          description: '5xx percentage > 5% for 5m'
        labels:
          severity: critical

      - uid: eventflowx_high_latency
        title: High p95 Latency
        condition: A
        data:
          - refId: A
            datasourceUid: Prometheus
            relativeTimeRange:
              from: 300
              to: 0
            model:
              expr: histogram_quantile(0.95, sum(rate(http_server_requests_seconds_bucket[5m])) by (le, job))
              intervalMs: 1000
              maxDataPoints: 43200
              refId: A
        for: 5m
        annotations:
          summary: 'High p95 latency in {{ $labels.job }}'
          description: 'p95 latency > 1s for 5m'
        labels:
          severity: warning

      - uid: eventflowx_instance_down
        title: Service Instance Down
        condition: A
        data:
          - refId: A
            datasourceUid: Prometheus
            relativeTimeRange:
              from: 120
              to: 0
            model:
              expr: up{job=~"api-gateway|booking-service|wallet-service|event-service"} == 0
              intervalMs: 1000
              maxDataPoints: 43200
              refId: A
        for: 2m
        annotations:
          summary: 'Service down: {{ $labels.job }}'
          description: 'Prometheus target is down'
        labels:
          severity: critical
