global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: prometheus
    static_configs:
      - targets: ["prometheus:9090"]

  - job_name: api-gateway
    metrics_path: /actuator/prometheus
    static_configs:
      - targets: ["api-gateway:8081"]

  - job_name: booking-service
    metrics_path: /actuator/prometheus
    static_configs:
      - targets: ["booking-service:8080"]

  - job_name: wallet-service
    metrics_path: /actuator/prometheus
    static_configs:
      - targets: ["wallet-service:8084"]

  - job_name: event-service
    metrics_path: /actuator/prometheus
    static_configs:
      - targets: ["event-service:8082"]
