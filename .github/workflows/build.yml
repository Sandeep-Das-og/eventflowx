name: PR Build

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  pull_request:
    branches:
      - main
      - master

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21
          cache: gradle

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Gradle Build
        run: ./gradlew clean build

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: build-artifacts
          if-no-files-found: error
          path: |
            services/**/build/libs/*.jar
            services/**/build/classes/java/main/**

  sonar:
    name: Sonar Scan
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: build-artifacts
          path: .

      - name: Sonar Scan
        uses: SonarSource/sonarqube-scan-action@1a6d90ebcb0e6a6b1d87e37ba693fe453195ae25
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}
        with:
          args: >
            -Dsonar.organization=${{ secrets.SONAR_ORGANIZATION }}
            -Dsonar.projectKey=${{ secrets.SONAR_PROJECT_KEY }}
            -Dsonar.projectName=eventflowx
            -Dsonar.sourceEncoding=UTF-8
            -Dsonar.java.binaries=**/build/classes/java/main

  system_tests:
    name: System Tests
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: build-artifacts
          path: .

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Create .env for docker compose
        run: |
          if [ -f .env.example ]; then
            cp .env.example .env
          else
            {
              printf '%s\n' "POSTGRES_USER=postgres";
              printf '%s\n' "POSTGRES_PASSWORD=postgres";
              printf '%s\n' "KC_BOOTSTRAP_ADMIN_USERNAME=admin";
              printf '%s\n' "KC_BOOTSTRAP_ADMIN_PASSWORD=admin";
              printf '%s\n' "KC_DB_USERNAME=keycloak_user";
              printf '%s\n' "KC_DB_PASSWORD=keycloak_password";
              printf '%s\n' "BOOKING_DB_URL=jdbc:postgresql://postgres:5432/booking_db";
              printf '%s\n' "BOOKING_DB_USERNAME=booking_user";
              printf '%s\n' "BOOKING_DB_PASSWORD=booking_password";
              printf '%s\n' "WALLET_DB_URL=jdbc:postgresql://postgres:5432/wallet_db";
              printf '%s\n' "WALLET_DB_USERNAME=wallet_user";
              printf '%s\n' "WALLET_DB_PASSWORD=wallet_password";
            } > .env
          fi

      - name: Start stack
        run: docker compose up -d --build

      - name: Wait for gateway health
        run: |
          for i in {1..40}; do
            if curl -fsS http://localhost:8081/actuator/health > /dev/null; then
              echo "Gateway is healthy";
              exit 0;
            fi
            sleep 5;
          done
          echo "Gateway did not become healthy in time";
          docker compose logs;
          exit 1

      - name: Install Newman
        run: npm install -g newman

      - name: Run Newman collection
        run: newman run tests/newman/EventFlowX.postman_collection.json -e tests/newman/local.postman_environment.json

      - name: Install Robot Framework deps
        run: pip install -r tests/robot/requirements.txt

      - name: Run Robot tests
        run: robot tests/robot/booking_flow.robot

      - name: Stop stack
        if: always()
        run: docker compose down -v
