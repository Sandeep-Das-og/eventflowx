name: PR Build

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  pull_request:
    branches:
      - main
      - master

jobs:
  build_and_test:
    name: Build & Unit Tests (Gradle)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21
          cache: gradle

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build with Gradle (unit tests)
        run: ./gradlew clean test

  integration_tests:
    name: Integration Tests (Gradle)
    runs-on: ubuntu-latest
    needs: build_and_test

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21
          cache: gradle

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Run integration tests
        run: ./gradlew integrationTest

  e2e_tests:
    name: Newman + Robot (E2E)
    runs-on: ubuntu-latest
    needs: integration_tests

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Create .env for docker compose
        run: |
          if [ -f .env.example ]; then
            cp .env.example .env
          else
            cat > .env <<'ENVEOF'
            # Copy to .env before running docker compose.
            # These defaults are aligned with docker/postgres/init.sql for local development.
            # If you change DB passwords here, also update docker/postgres/init.sql.

            POSTGRES_USER=postgres
            POSTGRES_PASSWORD=postgres

            KC_BOOTSTRAP_ADMIN_USERNAME=admin
            KC_BOOTSTRAP_ADMIN_PASSWORD=admin

            KC_DB_USERNAME=keycloak_user
            KC_DB_PASSWORD=keycloak_password

            BOOKING_DB_URL=jdbc:postgresql://postgres:5432/booking_db
            BOOKING_DB_USERNAME=booking_user
            BOOKING_DB_PASSWORD=booking_password

            WALLET_DB_URL=jdbc:postgresql://postgres:5432/wallet_db
            WALLET_DB_USERNAME=wallet_user
            WALLET_DB_PASSWORD=wallet_password
            ENVEOF
          fi

      - name: Start stack
        run: docker compose up -d --build

      - name: Wait for gateway health
        run: |
          for i in {1..40}; do
            if curl -fsS http://localhost:8081/actuator/health > /dev/null; then
              echo "Gateway is healthy";
              exit 0;
            fi
            sleep 5;
          done
          echo "Gateway did not become healthy in time";
          docker compose logs;
          exit 1

      - name: Install Newman
        run: npm install -g newman

      - name: Run Newman collection
        run: newman run tests/newman/EventFlowX.postman_collection.json -e tests/newman/local.postman_environment.json

      - name: Install Robot Framework deps
        run: pip install -r tests/robot/requirements.txt

      - name: Run Robot tests
        run: robot tests/robot/booking_flow.robot

      - name: Stop stack
        if: always()
        run: docker compose down -v

  sonar:
    name: Sonar Scan
    runs-on: ubuntu-latest
    needs:
      - build_and_test
      - integration_tests

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21
          cache: gradle

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build classes for Sonar
        run: ./gradlew classes

      - name: Sonar Scan
        uses: SonarSource/sonarqube-scan-action@1a6d90ebcb0e6a6b1d87e37ba693fe453195ae25
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}
        with:
          args: >
            -Dsonar.organization=${{ secrets.SONAR_ORGANIZATION }}
            -Dsonar.projectKey=${{ secrets.SONAR_PROJECT_KEY }}
            -Dsonar.projectName=eventflowx
            -Dsonar.sourceEncoding=UTF-8
            -Dsonar.java.binaries=**/build/classes/java/main
